  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

      width: 280px;

      color: #c8cad0;

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 8px 16px;
      border: none; border-radius: 8px;
      background: #3475C0; color: #fff;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: filter 120ms;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn svg { width: 14px; height: 14px; }
    .links { margin-top: 14px; display: flex; justify-content: center; gap: 12px; }
    .links a { display: inline-flex; opacity: 0.4; transition: opacity 120ms; }
    .links a:hover { opacity: 1; }
    .links svg { width: 16px; height: 16px; }
  </style>
