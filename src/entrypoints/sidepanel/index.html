<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <button class="tabs__btn" data-tab="asn" role="tab" aria-selected="false" aria-controls="panel-asn"><svg class="tabs__icon" viewBox="0 0 24 24"><path fill="currentColor" d="M3 9v6h4V9zm6 0v6h6V9zm8 0v6h4V9zM4 4h16v3h2V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v3h2zM2 17v3c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-3h-2v3H4v-3z"/></svg>ASN</button>

    <div class="panels">
      <div class="panel panel--active" id="panel-list" role="tabpanel" aria-labelledby="tab-list">
        <div class="toolbar" id="toolbar" role="toolbar" aria-label="Filters"></div>
        <div class="bulk-bar" id="bulk-bar" style="display:none" role="status" aria-live="polite"></div>
        <div class="country-list" id="country-list" role="list" aria-label="Countries"></div>
        <div class="output-panel" id="output-panel" aria-label="Output"></div>
      </div>
      <div class="panel" id="panel-asn" role="tabpanel" aria-labelledby="tab-asn">
        <div class="toolbar" id="asn-toolbar" role="toolbar" aria-label="ASN filters"></div>
        <div class="bulk-bar" id="asn-bulk-bar" style="display:none" role="status" aria-live="polite"></div>
        <div class="asn-list" id="asn-list" role="list" aria-label="Ad networks"></div>
        <div class="output-panel" id="asn-output-panel" aria-label="Output"></div>
      </div>
      <div class="panel" id="panel-import" role="tabpanel" aria-labelledby="tab-import">
        <div class="import-panel" id="import-panel"></div>
      </div>
      <div class="panel" id="panel-presets" role="tabpanel" aria-labelledby="tab-presets">
        <div class="presets-panel" id="presets-panel"></div>
      </div>
      <div class="panel" id="panel-settings" role="tabpanel" aria-labelledby="tab-settings">
        <div class="settings-panel" id="settings-panel"></div>
      </div>
    </div>

  <script type="module" src="./main.ts"></script>

</html>
